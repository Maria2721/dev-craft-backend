services:
  app:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PORT: ${PORT}
      CORS_ORIGIN: ${CORS_ORIGIN}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-900}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-604800}
      AI_LLM_PROVIDER: ${AI_LLM_PROVIDER:-api_llm}
      AI_MAX_MESSAGE_LENGTH: ${AI_MAX_MESSAGE_LENGTH:-4000}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_API_BASE_URL: ${AI_API_BASE_URL:-}
      AI_API_MODEL: ${AI_API_MODEL:-}
      AI_LOCAL_BASE_URL: ${AI_LOCAL_BASE_URL:-}
      AI_LOCAL_MODEL: ${AI_LOCAL_MODEL:-}
      AI_DIFY_BASE_URL: ${AI_DIFY_BASE_URL:-}
      AI_DIFY_APP_API_KEY: ${AI_DIFY_APP_API_KEY:-}
      AI_DIFY_END_USER: ${AI_DIFY_END_USER:-}
      AI_DIFY_USE_CONTEXT_INPUTS: ${AI_DIFY_USE_CONTEXT_INPUTS:-}
      MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_BOT_CONVERSATION_USER_ID: ${DISCORD_BOT_CONVERSATION_USER_ID:-}
      DISCORD_BOT_INTERNAL_API_TOKEN: ${DISCORD_BOT_INTERNAL_API_TOKEN:-}
      SWAGGER_USER: ${SWAGGER_USER}
      SWAGGER_PASSWORD: ${SWAGGER_PASSWORD}
    command: ["sh", "-c", "sleep 5 && exec node dist/main.js"]

  discord-bot:
    build:
      context: .
      dockerfile: docker/discord-bot/Dockerfile
    restart: on-failure
    depends_on:
      app:
        condition: service_started
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      AI_DIFY_BASE_URL: ${AI_DIFY_BASE_URL:-}
      AI_DIFY_APP_API_KEY: ${AI_DIFY_APP_API_KEY:-}
      DISCORD_BOT_CHANNEL_ID: ${DISCORD_BOT_CHANNEL_ID:-}
      INTERNAL_CHAT_API_BASE_URL: http://app:${PORT:-6969}
      DISCORD_BOT_INTERNAL_API_TOKEN: ${DISCORD_BOT_INTERNAL_API_TOKEN:-}

  caddy:
    profiles:
      - caddy
    image: caddy:2.11-alpine
    restart: on-failure
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}
      APP_UPSTREAM_PORT: ${PORT:-6969}
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
