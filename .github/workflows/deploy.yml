name: Deploy to server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          APP_PATH: ${{ secrets.APP_PATH }}
        run: |
          if [ -z "$SSH_PRIVATE_KEY" ] || [ -z "$SERVER_HOST" ] || [ -z "$SERVER_USER" ]; then
            echo "Missing SSH_PRIVATE_KEY, SERVER_HOST or SERVER_USER secrets"
            exit 1
          fi
          APP_PATH="${APP_PATH:-/var/www/html/dev-craft-backend}"
          mkdir -p ~/.ssh
          KEY=$(echo "$SSH_PRIVATE_KEY" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if echo "$KEY" | grep -q -- '-----BEGIN'; then
            BEGIN_LINE=$(echo "$KEY" | grep -o -- '-----BEGIN[^-]*-----' | head -1)
            END_LINE=$(echo "$KEY" | grep -o -- '-----END[^-]*-----' | head -1)
            MIDDLE=$(echo "$KEY" | sed 's/^.*-----BEGIN[^-]*-----//' | sed 's/-----END[^-]*-----.*$//' | tr -d '\n\r ')
            {
              echo "$BEGIN_LINE"
              echo "$MIDDLE" | fold -w 64
              echo "$END_LINE"
            } > ~/.ssh/deploy_key
          else
            echo "$KEY" > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key \
            "$SERVER_USER@$SERVER_HOST" \
            "cd $APP_PATH && git pull && bash scripts/deploy-on-server.sh"
