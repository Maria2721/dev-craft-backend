name: Deploy to server

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

  deploy:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          APP_PATH: ${{ secrets.APP_PATH }}
        run: |
          if [ -z "$SSH_PRIVATE_KEY" ] || [ -z "$SERVER_HOST" ] || [ -z "$SERVER_USER" ]; then
            echo "Missing SSH_PRIVATE_KEY, SERVER_HOST or SERVER_USER secrets"
            exit 1
          fi
          APP_PATH="${APP_PATH:-/var/www/html/dev-craft-backend}"
          mkdir -p ~/.ssh
          KEY=$(echo "$SSH_PRIVATE_KEY" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if echo "$KEY" | grep -q -- '-----BEGIN'; then
            BEGIN_LINE=$(echo "$KEY" | grep -o -- '-----BEGIN[^-]*-----' | head -1)
            END_LINE=$(echo "$KEY" | grep -o -- '-----END[^-]*-----' | head -1)
            MIDDLE=$(echo "$KEY" | sed ':a;N;$!ba;s/^.*-----BEGIN[^-]*-----//;s/-----END[^-]*-----.*$//' | tr -d '\n\r ')
            {
              echo "$BEGIN_LINE"
              echo "$MIDDLE" | fold -w 64
              echo "$END_LINE"
            } > ~/.ssh/deploy_key
          else
            B64=$(echo "$KEY" | tr -d '\n\r ')
            if echo "$B64" | grep -qE '^[A-Za-z0-9+/=]+$'; then
              {
                echo "-----BEGIN OPENSSH PRIVATE KEY-----"
                echo "$B64" | fold -w 70
                echo "-----END OPENSSH PRIVATE KEY-----"
              } > ~/.ssh/deploy_key
            else
              echo "$KEY" > ~/.ssh/deploy_key
            fi
          fi
          chmod 600 ~/.ssh/deploy_key
          if ! ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "::error::Invalid SSH key in secret. Use a private key without passphrase and paste it with newlines preserved."
            exit 1
          fi
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key \
            "$SERVER_USER@$SERVER_HOST" \
            "cd $APP_PATH && git pull && bash scripts/deploy-on-server.sh"
